<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>나영석 VS 막내PD — 台灣正體中文字幕 POC</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --line: #262b36;
    --fg: #e8eaf0; --dim: #8b93a5; --accent: #ffd54a; --ko: #9ecbff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 15px; font-weight: 600; }
  #backBtn {
    display: none; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 8px; flex: none;
    background: var(--panel); border: 1px solid var(--line);
    color: var(--fg); text-decoration: none; font-size: 16px;
  }
  #backBtn:hover { border-color: var(--accent); color: var(--accent); }
  header .meta { font-size: 12px; color: var(--dim); }
  .controls { margin-left: auto; display: flex; gap: 8px; }
  .controls button {
    background: var(--panel); color: var(--fg); border: 1px solid var(--line);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  .controls button.on { border-color: var(--accent); color: var(--accent); }
  main { flex: 1; display: flex; min-height: 0; }
  .stage { flex: 1.6; display: flex; flex-direction: column; min-width: 0; }
  .video-wrap { position: relative; background: #000; flex: 1; min-height: 0; }
  .video-wrap iframe, .video-wrap #player { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* 畫面字卡層(疊在影片上,韓綜風) */
  #cardLayer {
    position: absolute; top: 6%; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    pointer-events: none; z-index: 5;
  }
  .card-chip {
    max-width: 82%; background: rgba(255,255,255,.94); color: #17181c;
    font-weight: 700; font-size: clamp(14px, 2.1vw, 24px); line-height: 1.35;
    padding: .35em .9em; border-radius: .55em; text-align: center;
    box-shadow: 0 4px 18px rgba(0,0,0,.45);
    animation: pop .18s ease-out;
  }
  @keyframes pop { from { transform: translateY(-6px); opacity: 0; } }

  /* 對話字幕:透明疊在影片底部,不佔版面 → 行數變化不會擠動 iframe、不會裁切 */
  #subBand {
    position: absolute; left: 0; right: 0; bottom: 7%;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 0 4%; pointer-events: none; z-index: 6; text-align: center;
  }
  #subKo, #subZh {
    width: fit-content; max-width: 92%;
    background: rgba(8,10,14,.72); border-radius: .4em; padding: .1em .55em;
  }
  #subKo:empty, #subZh:empty { display: none; }
  #subKo { color: var(--ko); font-size: clamp(12px, 1.4vw, 16px); line-height: 1.35; }
  #subZh {
    font-size: clamp(18px, 2.6vw, 30px); font-weight: 600; line-height: 1.4;
    white-space: pre-line; text-shadow: 0 1px 2px rgba(0,0,0,.8);
  }
  #subZh .warn { color: var(--accent); }

  /* 全螢幕:整個 stage 進 fullscreen,字幕/字卡本來就疊在影片上,照常顯示 */
  .stage:fullscreen { background: #000; }
  .stage:fullscreen .video-wrap { flex: 1; aspect-ratio: auto; }

  /* transcript */
  aside {
    flex: 1; border-left: 1px solid var(--line); background: var(--panel);
    display: flex; flex-direction: column; min-width: 300px; max-width: 460px;
  }
  aside .head { padding: 10px 14px; font-size: 12px; color: var(--dim); border-bottom: 1px solid var(--line); }
  #list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .row { padding: 7px 14px; cursor: pointer; border-left: 3px solid transparent; }
  .row:hover { background: rgba(255,255,255,.04); }
  .row.cur { background: rgba(255,213,74,.08); border-left-color: var(--accent); }
  .row .t { color: var(--dim); font-size: 11px; margin-right: 6px; font-variant-numeric: tabular-nums; }
  .row .ko { display: block; color: var(--ko); font-size: 12px; opacity: .75; }
  .row .zh { font-size: 14px; white-space: pre-line; }
  .row.card .zh { color: #ffdf80; }
  .row.card .zh::before { content: "🃏 "; font-size: 11px; }

  @media (max-width: 860px) {
    main { flex-direction: column; }
    aside { max-width: none; min-width: 0; border-left: 0; border-top: 1px solid var(--line); flex: 1; }
    .stage { flex: 0 0 auto; }
    .video-wrap { aspect-ratio: 16/9; flex: none; }
  }
</style>
</head>
<body>
<header>
  <a id="backBtn" href="." title="回影片清單">←</a>
  <h1>나영석 VS 막내PD・第1話幕後</h1>
  <span class="meta">頻道十五夜(channel fullmoon)・台灣正體中文字幕 POC・build __BUILD__</span>
  <div class="controls">
    <button id="btnMode">字幕:韓+中</button>
    <button id="btnCard" class="on">字卡:畫面上</button>
    <button id="btnFollow" class="on">跟隨捲動</button>
    <button id="btnFull">⛶ 全螢幕</button>
  </div>
</header>
<main>
  <div class="stage">
    <div class="video-wrap">
      <div id="player"></div>
      <div id="cardLayer"></div>
      <div id="subBand"><div id="subKo"></div><div id="subZh"></div></div>
    </div>
  </div>
  <aside>
    <div class="head">逐句稿(點擊跳轉)・🃏 = 畫面字卡</div>
    <div id="list"></div>
  </aside>
</main>
<script>
const EMBEDDED = __CUES_JSON__;   // 內嵌模式有值;動態模式為 null
let mode = 1, cardMode = 0, follow = true;
let yt = null, ytReady = false, pendingVid = null;
let speech = [], cards = [];
const rows = new Map();
const list = document.getElementById("list");
const subKo = document.getElementById("subKo");
const subZh = document.getElementById("subZh");
const cardLayer = document.getElementById("cardLayer");
let lastBandKey = "", lastCardKey = "";

const tag = document.createElement("script");
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);
window.onYouTubeIframeAPIReady = () => { ytReady = true; if (pendingVid) createYT(pendingVid); };
function createYT(v) {
  yt = new YT.Player("player", { videoId: v, playerVars: { rel: 0, playsinline: 1, cc_load_policy: 0 } });
}

async function boot() {
  const vid = new URLSearchParams(location.search).get("v");
  if (EMBEDDED && !vid) return initPlayer("tFaHkZO587c", EMBEDDED);
  if (vid) {
    document.getElementById("backBtn").style.display = "flex";
    let r = await fetch("/cues/" + vid);
    if (!r.ok) r = await fetch("/cues-" + vid + ".json");
    if (r.ok) return initPlayer(vid, await r.json());
    list.innerHTML = '<div class="row">找不到 ' + vid + ' 的字幕,回清單:</div>';
  }
  showIndex();
}

async function showIndex() {
  try {
    const vids = await (await fetch("/list")).json();
    if (!vids.length) { list.innerHTML += '<div class="row">還沒有影片,去 /admin 建立</div>'; return; }
    for (const v of vids) {
      const d = document.createElement("div");
      d.className = "row";
      d.innerHTML = '<span class="zh"></span><span class="ko"></span>';
      d.querySelector(".zh").textContent = v.title || v.id;
      const ko = d.querySelector(".ko");
      ko.textContent = v.cues + " cues・" + v.id + "・";
      const a = document.createElement("a");
      a.href = "https://youtu.be/" + v.id; a.target = "_blank";
      a.textContent = "YouTube ↗"; a.style.color = "var(--ko)";
      a.onclick = e => e.stopPropagation();
      ko.appendChild(a);
      d.onclick = () => location.search = "?v=" + v.id;
      list.appendChild(d);
    }
  } catch (e) { list.innerHTML += '<div class="row">清單載入失敗(本檔案可能是離線單檔版)</div>'; }
}

function initPlayer(vid, cues) {
  speech = cues.filter(c => c.kind === "speech");
  cards = cues.filter(c => c.kind === "card");
  for (const c of cues) {
    const div = document.createElement("div");
    div.className = "row" + (c.kind === "card" ? " card" : "");
    const t = Math.floor(c.start);
    const ts = String(Math.floor(t/60)).padStart(2,"0") + ":" + String(t%60).padStart(2,"0");
    div.innerHTML = '<span class="t">' + ts + '</span>' +
      (c.kind === "speech" && c.ko ? '<span class="ko"></span>' : "") + '<span class="zh"></span>';
    if (c.kind === "speech" && c.ko) div.querySelector(".ko").textContent = c.ko;
    div.querySelector(".zh").textContent = c.zh;
    div.onclick = () => { if (yt && yt.seekTo) { yt.seekTo(c.start, true); yt.playVideo(); } };
    list.appendChild(div);
    rows.set(c.id, div);
  }
  if (ytReady) createYT(vid); else pendingVid = vid;
}

function activeAt(arr, t) {
  const out = [];
  for (const c of arr) { if (c.start > t) break; if (t < c.end) out.push(c); }
  return out;
}

setInterval(() => {
  if (!yt || !yt.getCurrentTime) return;
  const t = yt.getCurrentTime();
  const sp = activeAt(speech, t);
  const cd = activeAt(cards, t);
  const bandKey = sp.map(c=>c.id).join(",") + "|" + cd.map(c=>c.id).join(",") + "|" + mode + cardMode;
  const cardKey = cd.map(c=>c.id).join(",") + "|" + cardMode;
  if (bandKey === lastBandKey) return;
  lastBandKey = bandKey;

  const cur = sp[sp.length - 1];
  if (mode === 2 || !cur) { subKo.textContent = ""; subZh.textContent = ""; }
  else {
    subKo.textContent = (mode === 1 && cur.ko) ? cur.ko : "";
    subZh.textContent = cur.zh;
  }
  if (cardMode === 1 && cd.length && mode !== 2) {
    subZh.textContent = (subZh.textContent ? subZh.textContent + "\n" : "") +
      cd.map(c => "【" + c.zh.replace(/\n/g," ") + "】").join(" ");
  }
  if (cardKey !== lastCardKey) {
    lastCardKey = cardKey;
    cardLayer.innerHTML = "";
    if (cardMode === 0) {
      for (const c of cd.slice(-2)) {  // 同時最多疊 2 張字卡,保護版面
        const chip = document.createElement("div");
        chip.className = "card-chip";
        chip.textContent = c.zh;
        cardLayer.appendChild(chip);
      }
    }
  }
  document.querySelectorAll(".row.cur").forEach(e => e.classList.remove("cur"));
  const focus = cur || cd[cd.length-1];
  if (focus) {
    const row = rows.get(focus.id);
    row.classList.add("cur");
    if (follow) row.scrollIntoView({ block: "center", behavior: "smooth" });
  }
}, 200);

const btnMode = document.getElementById("btnMode");
btnMode.onclick = () => { mode = (mode + 1) % 3; btnMode.textContent = "字幕:" + ["中文","韓+中","隱藏"][mode]; };
const btnCard = document.getElementById("btnCard");
btnCard.onclick = () => {
  cardMode = (cardMode + 1) % 3;
  btnCard.textContent = "字卡:" + ["畫面上","字幕帶","隱藏"][cardMode];
  btnCard.classList.toggle("on", cardMode !== 2);
};
const btnFollow = document.getElementById("btnFollow");
btnFollow.onclick = () => { follow = !follow; btnFollow.classList.toggle("on", follow); };
const btnFull = document.getElementById("btnFull");
const stage = document.querySelector(".stage");
btnFull.onclick = () => {
  if (document.fullscreenElement || document.webkitFullscreenElement)
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  else (stage.requestFullscreen || stage.webkitRequestFullscreen).call(stage);
};
document.addEventListener("fullscreenchange", () => {
  btnFull.classList.toggle("on", !!document.fullscreenElement);
  btnFull.textContent = document.fullscreenElement ? "⛶ 離開全螢幕" : "⛶ 全螢幕";
});

boot();
</script>
</body>
</html>
